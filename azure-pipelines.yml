trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
- group: gcp-dev

stages:
- stage: BuildAndPush
  displayName: Build and Push Images

  jobs:
  - job: DockerBuildPush
    displayName: Build Frontend and Backend

    steps:

    - checkout: self

    ####################################################################
    # Initialize Azure Workload Identity Service Connection
    ####################################################################
    - task: AzureCLI@2
      displayName: Initialize Azure Workload Identity
      inputs:
        azureSubscription: 'ai-pod-devops-poc-nec'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Azure ARM service connection initialized."

    ####################################################################
    # Authenticate to GCP using Azure DevOps OIDC
    ####################################################################
    - bash: |
        set -euo pipefail

        echo "Requesting Azure DevOps OIDC token..."

        OIDC_RESPONSE=$(curl -sS -X POST \
          "$(System.CollectionUri)$(System.TeamProjectId)/_apis/distributedtask/hubs/build/plans/$(System.PlanId)/jobs/$(System.JobId)/oidctoken?serviceConnectionId=$(ADO_GCP_SERVICE_CONNECTION_ID)&api-version=7.1-preview.1" \
          -H "Authorization: Bearer $(System.AccessToken)" \
          -H "Content-Type: application/json" \
          -d "{}")

        OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.oidcToken')

        if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
          echo "Failed to retrieve OIDC token."
          echo "$OIDC_RESPONSE"
          exit 1
        fi

        echo "OIDC token retrieved successfully."

        echo "Exchanging OIDC token with Google STS..."

        STS_RESPONSE=$(curl -sS -X POST \
          https://sts.googleapis.com/v1/token \
          -H "Content-Type: application/json" \
          -d "{
            \"audience\":\"//iam.googleapis.com/projects/$(GCP_PROJECT_NUMBER)/locations/global/workloadIdentityPools/$(GCP_WORKLOAD_POOL)/providers/$(GCP_WORKLOAD_PROVIDER)\",
            \"grantType\":\"urn:ietf:params:oauth:grant-type:token-exchange\",
            \"requestedTokenType\":\"urn:ietf:params:oauth:token-type:access_token\",
            \"scope\":\"https://www.googleapis.com/auth/cloud-platform\",
            \"subjectTokenType\":\"urn:ietf:params:oauth:token-type:jwt\",
            \"subjectToken\":\"$OIDC_TOKEN\"
          }")

        FEDERATED_TOKEN=$(echo "$STS_RESPONSE" | jq -r '.access_token')

        if [ -z "$FEDERATED_TOKEN" ] || [ "$FEDERATED_TOKEN" = "null" ]; then
          echo "Failed to exchange token with Google STS."
          echo "$STS_RESPONSE"
          exit 1
        fi

        echo "Generating GCP Service Account access token..."

        SA_RESPONSE=$(curl -sS -X POST \
          "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/$(GCP_DEPLOY_SA):generateAccessToken" \
          -H "Authorization: Bearer $FEDERATED_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"scope":["https://www.googleapis.com/auth/cloud-platform"]}')

        ACCESS_TOKEN=$(echo "$SA_RESPONSE" | jq -r '.accessToken')

        if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
          echo "Failed to generate Service Account access token."
          echo "$SA_RESPONSE"
          exit 1
        fi

        echo "##vso[task.setvariable variable=GCP_ACCESS_TOKEN;issecret=true]$ACCESS_TOKEN"

      displayName: Authenticate to GCP (Native WIF)

      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    ####################################################################
    # Docker Login
    ####################################################################
    - bash: |
        echo "$(GCP_ACCESS_TOKEN)" | docker login \
          -u oauth2accesstoken \
          --password-stdin \
          https://$(GCP_REGION)-docker.pkg.dev
      displayName: Docker Login

    ####################################################################
    # Build & Push Frontend
    ####################################################################
    - bash: |
        docker build \
          -t $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/frontend:$(Build.BuildId) \
          ./frontend

        docker tag \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/frontend:$(Build.BuildId) \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/frontend:latest

        docker push \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/frontend:$(Build.BuildId)

        docker push \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/frontend:latest

      displayName: Build & Push Frontend

    ####################################################################
    # Build & Push Backend
    ####################################################################
    - bash: |
        docker build \
          -t $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/backend:$(Build.BuildId) \
          ./backend

        docker tag \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/backend:$(Build.BuildId) \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/backend:latest

        docker push \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/backend:$(Build.BuildId)

        docker push \
          $(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/backend:latest

      displayName: Build & Push Backend

      ####################################################################
    # Deploy Backend to Cloud Run
    ####################################################################
    - bash: |

        curl -sS -X PATCH \
          "https://run.googleapis.com/v2/projects/$(GCP_PROJECT_ID)/locations/$(GCP_REGION)/services/$(CLOUD_RUN_SERVICE_BE)?updateMask=template.containers[0].image" \
          -H "Authorization: Bearer $(GCP_ACCESS_TOKEN)" \
          -H "Content-Type: application/json" \
          -d "{
            \"template\": {
              \"containers\": [
                {
                  \"image\": \"$(GCP_REGION)-docker.pkg.dev/$(GCP_PROJECT_ID)/$(GCP_ARTIFACT_REPO)/backend:$(Build.BuildId)\"
                }
              ]
            }
          }"

      displayName: Deploy Backend to Cloud Run